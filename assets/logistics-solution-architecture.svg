<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="520" rx="28" fill="#0F172A"/>
  <text x="600" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#F8FAFC">
    Logistics Performance Intelligence Hub
  </text>
  <text x="600" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#CBD5E1">
    Fluxo simples da solução: geração de dados, banco analítico, BI e alertas operacionais
  </text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#38BDF8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Cards -->
  <g filter="url(#shadow)">
    <rect x="70" y="170" width="190" height="145" rx="22" fill="#1E293B" stroke="#334155"/>
    <text x="165" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#F8FAFC">Dados</text>
    <text x="165" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">Base fictícia gerada</text>
    <text x="165" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">por Python</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="170" width="190" height="145" rx="22" fill="#1E293B" stroke="#334155"/>
    <text x="445" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#F8FAFC">PostgreSQL</text>
    <text x="445" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">Modelagem</text>
    <text x="445" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">e consultas SQL</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="630" y="170" width="190" height="145" rx="22" fill="#1E293B" stroke="#334155"/>
    <text x="725" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#F8FAFC">Power BI</text>
    <text x="725" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">Dashboards</text>
    <text x="725" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">KPIs logísticos</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="910" y="170" width="190" height="145" rx="22" fill="#1E293B" stroke="#334155"/>
    <text x="1005" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#F8FAFC">n8n</text>
    <text x="1005" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">Alertas</text>
    <text x="1005" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">e automações</text>
  </g>

  <!-- Arrows -->
  <line x1="270" y1="242" x2="335" y2="242" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="550" y1="242" x2="615" y2="242" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="830" y1="242" x2="895" y2="242" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- KPI strip -->
  <rect x="190" y="380" width="820" height="74" rx="18" fill="#020617" stroke="#334155"/>
  <text x="600" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#F8FAFC">
    Foco analítico
  </text>
  <text x="600" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#CBD5E1">
    SLA • Custo por entrega • Atrasos • Ocupação • Performance de rotas • Alertas operacionais
  </text>
</svg>
